<!doctype html>
<html lang="ku" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>سیستەمی وێستگە - وەشانی نوێکراو</title>
    <link
      rel="icon"
      type="image/png"
      href="https://arduexcel.github.io/img/arduecel.ico"
    />
    <link rel="stylesheet" href="style.css" />

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  </head>
  <body>
    <div id="login-overlay">
      <div class="login-box">
        <img
          src="https://arduexcel.github.io/img/ms-icon-144x144.png"
          width="70"
        />
        <h3>چوونەژوورەوەی کارمەند</h3>
        <select id="userSelect">
          <option>بار دەبێت...</option>
        </select>
        <input
          type="password"
          id="userPass"
          placeholder="وشەی تێپەڕ (Password)"
        />
        <button
          onclick="login()"
          style="
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            margin-top: 10px;
          "
        >
          داخلبوون
        </button>
      </div>
    </div>

    <div class="container" id="main-content" style="display: none">
      <div style="text-align: center; margin-bottom: 10px">
        <h4 id="displayEmployeeName" style="margin: 0; color: var(--dark)">
          بەکارهێنەر: ...
        </h4>
      </div>
      <div class="top-bar">
        <button class="btn-logout" onclick="logout()">دەرچوون</button>

 <button id="reportModeBtn" class="btn-report" onclick="toggleMode('report')">📋 ڕاپۆرت</button>
        
        <button
          id="parkingModeBtn"
          class="btn-parking"
          onclick="toggleMode('parking')"
        >
          🅿️ پارکینگ
        </button>
        <button id="fineModeBtn" class="btn-fine" onclick="toggleMode('fine')">
          ⚖️ غەرامە
        </button>
        <button id="monthlyModeBtn" class="btn-monthly" onclick="toggleMode('monthly')">
          📅 مانگانە
        </button>
        <button
          style="background: var(--dark); color: white; padding: 8px 15px"
          onclick="openMyReport()"
        >
          ڕاپۆرتی من
        </button>
      </div>

      <div class="stats-bar">
        <div class="stat-card">
          <h4>پسووڵەکانت</h4>
          <p id="totalCount">0</p>
        </div>
        <div class="stat-card">
          <h4>کۆی پارەکەت</h4>
          <p id="totalMoney">0</p>
        </div>
      </div>

      <input
        type="text"
        id="carNumberInput"
        oninput="searchCarLocally(this.value)"
        placeholder="ژمارەی ئۆتۆمبێل..."
      />

      <div id="carMatchList"></div>

      <div id="input-fields">
        <div style="display: flex; gap: 10px">
          <input type="text" id="resLine" placeholder="هێڵ" readonly />
          <select id="resLineSelect" style="display:none;">
            <option value="">هێڵ هەڵبژێرە...</option>
            <option>بغداد</option>
            <option>هەولێر</option>
            <option>کرکوک</option>
            <option>ڕانیە</option>
            <option>کۆیە</option>
            <option>چەمچەماڵ</option>
            <option>قەڵادزێ</option>
            <option>دووز</option>
          </select>
          <input type="text" id="resType" placeholder="جۆر" readonly />
          <select id="resTypeSelect" style="display:none;">
            <option value="">جۆر هەڵبژێرە...</option>
            <option>تەکسی</option>
            <option>پاص</option>
          </select>
        </div>

        <div style="display: flex; gap: 5px">
          <input type="number" id="resPrice" readonly placeholder="نرخ" />
          <button
            id="btnHalf"
            onclick="makeHalfPrice()"
            style="
              background: var(--warning);
              color: white;
              width: 65px;
              height: 50px;
              border-radius: 8px;
              display: none;
            "
          >
            ½
          </button>
        </div>

        <input type="text" id="resNote" placeholder="تێبینی پسووڵەکانت.." />

        <div id="monthly-dates" style="display:none; gap:10px;">
          <div style="flex:1;">
            <label style="font-size:13px; color:#555;">لە بەرواری</label>
            <input type="date" id="resFromDate" style="margin-bottom:0;" />
          </div>
          <div style="flex:1;">
            <label style="font-size:13px; color:#555;">بۆ بەرواری</label>
            <input type="date" id="resToDate" style="margin-bottom:0;" />
          </div>
        </div>
      </div>

      <button class="btn-save" id="saveBtn" onclick="handleAction()">
        خەزن و پڕینت
      </button>
    </div>

    <div id="report-modal">
      <div class="modal-content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
          "
        >
          <h3 id="reportTitle">ڕاپۆرتی من</h3>
          <button
            onclick="closeReport()"
            style="background: red; color: white; padding: 5px 15px"
          >
            X
          </button>
        </div>
        <input
          type="text"
          id="reportSearchInput"
          oninput="filterReportByNumber(this.value)"
          placeholder="گەڕان بە ژمارە..."
          style="
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            direction: rtl;
            box-sizing: border-box;
          "
        />
        <table>
          <thead>
            <tr>
              <th>ژ.وەسڵ</th>
              <th>کات</th>
              <th>ژمارە</th>
              <th>هێڵ</th>
              <th>جۆر</th>
              <th>نرخ</th>
              <th>تێبینی</th>
              <th>کردار</th>
            </tr>
          </thead>
          <tbody id="report-body"></tbody>
        </table>
      </div>
    </div>

    <div id="invoice-print">
      <img
        src="https://arduexcel.github.io/img/ms-icon-144x144.png"
        width="160"
      />
      <h5 style="font-size: 20px; margin: 0px 0">تێرمناڵی سه‌ره‌كی سلێمانی</h5>
      <h5 id="p-inv-no" style="font-size: 20px; margin: 0px 0"></h5>
      <h1 id="p-num" style="font-size: 30px; margin: 0px 0"></h1>
      <h1 id="p-line-type" style="font-size: 24px; margin: 0px 0"></h1>
      <h2 id="p-price"></h2>
      <p id="p-monthly-dates" style="font-size: 18px; font-weight: bold; display: none; border: 1px dashed black; padding: 5px;"></p>
      <h3
        id="p-note-txt"
        style="border: 1px solid black; padding: 5px; display: none"
      ></h3>
      <p id="p-date" style="font-size: 25px; font-weight: bold"></p>
      <p id="p-user" style="font-size: 20px"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
